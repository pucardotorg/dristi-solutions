<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Confirmation</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem;
        text-align: center;
        color: #0b0c0c;
      }
      h1 {
        font-size: 2.5rem;
        color: #2e8b2e;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1.2rem;
      }
      .subtext {
        margin-top: 0;
      }
      .info-card {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        text-align: left;
        max-width: 540px;
        margin: 1.5rem auto;
        padding: 20px 24px;
        background-color: #eef4fc;
        border: 1px solid #d3e3f8;
        border-radius: 8px;
      }
      .info-card .info-icon {
        flex-shrink: 0;
        margin-top: 4px;
      }
      .info-card .info-title {
        margin: 0 0 6px 0;
        font-size: 1.4rem;
        font-weight: 700;
        color: #1a5dd6;
      }
      .info-card .info-line {
        margin: 0;
        font-size: 1.15rem;
        color: #0b0c0c;
      }
      .info-card .info-warning {
        margin: 4px 0 0 0;
        font-size: 1.15rem;
        font-weight: 700;
        color: #0b0c0c;
      }
      .spinner {
        margin: 2rem auto 0 auto;
        width: 56px;
        height: 56px;
        border: 6px solid #e2e8f5;
        border-top-color: #1a5dd6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <h1>Payment Successful!</h1>
    <p class="subtext">Your transaction has been processed successfully.</p>

    <div class="info-card" role="status">
      <svg class="info-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="12" r="12" fill="#2563eb" />
        <rect x="11" y="10" width="2" height="7" rx="1" fill="#ffffff" />
        <circle cx="12" cy="7" r="1.3" fill="#ffffff" />
      </svg>
      <div>
        <p class="info-title">Please wait while we redirect you.</p>
        <p class="info-line">This window will close automatically.</p>
        <p class="info-warning">Do not close or refresh this window.</p>
      </div>
    </div>

    <div class="spinner" aria-hidden="true"></div>

    <script src="main.js"></script>
    <script>
      // Set timeout to close the window after 15 seconds
      setTimeout(() => {
        window.close();
      }, 15000); // 15000 milliseconds = 15 seconds
    </script>
  </body>
</html>
