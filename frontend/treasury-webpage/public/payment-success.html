<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Confirmation</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f3f4f6;
        color: #1f2937;
      }
      .card {
        position: relative;
        width: 100%;
        max-width: 440px;
        margin: 1.5rem;
        padding: 48px 40px 40px 40px;
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background-color: #3b82f6;
      }
      .spinner {
        margin: 0 auto 28px auto;
        width: 64px;
        height: 64px;
        border: 6px solid #e5e9f2;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .card h1 {
        margin: 0 0 12px 0;
        font-size: 1.6rem;
        font-weight: 700;
        color: #1f2937;
      }
      .card .subtext {
        margin: 0 auto 28px auto;
        max-width: 320px;
        font-size: 1.05rem;
        line-height: 1.5;
        color: #6b7280;
      }
      .pill {
        display: inline-block;
        padding: 9px 20px;
        background-color: #eceef1;
        border-radius: 9999px;
        font-size: 0.95rem;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div class="card" role="status">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Processing Your Payment</h1>
      <p class="subtext">Please wait a moment while we securely update your transaction.</p>
      <span class="pill">Do not close or refresh this window</span>
    </div>

    <script src="main.js"></script>
    <script>
      // Set timeout to close the window after 15 seconds
      setTimeout(() => {
        window.close();
      }, 15000); // 15000 milliseconds = 15 seconds
    </script>
  </body>
</html>
