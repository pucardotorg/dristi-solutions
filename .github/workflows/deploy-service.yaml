name: Manual Deployment Pipeline

run-name: >
  ${{
    github.event_name == 'workflow_dispatch' &&
      format(
        'Deploy to {1} : {0}',
        github.event.inputs.service,
        github.event.inputs.deployment_env,
        github.ref_name
      )
  }}

on:
  workflow_dispatch:
    inputs:
      service:
        required: true
        description: "Service name in kubernetes cluster (eg: egov-user)"
        type: string
      tag:
        required: true
        description: "Image tag (eg: develop-2xxxxxxxxxxxxxxxxxxxx5)"
        type: string
      deployment_env:
        required: true
        description: "Deployment environment (eg: dev, qa, demo)"
        type: choice
        default: dev
        options:
          - dev
          - qa
          - demo
      service_group:
        required: true
        description: "Service group in kubernetes cluster (eg: egov)"
        type: choice
        default: core-services
        options:
          - core-services

jobs:
  environment: 
    name: ${{ inputs.deployment_env }}
  deploy:
      - name: Deployment Summary
        run: |
          echo "deploying: docker.io/venkatramireddyb/${{ inputs.service }}:${{ inputs.tag }} and deploying to ${{ inputs.deployment_env }}"

      - name: Deploy to Kubernetes
        uses: pucardotorg/pucar-DevOps/.github/actions/deploy-service@Solutions-Pipeline
        with:
          environment: ${{ inputs.deployment_env }}
          service_group: ${{ inputs.service_group }}
          service_name: ${{ inputs.service }}
          image_tag: ${{ inputs.tag }}
          kubeconfig: ${{ secrets.KUBECONFIG }}
          env_file: ${{ vars.HELMFILE_ENV }}
          checkout_ref: ${{ vars.DEVOPS_BRANCH }}
          sops_keys_txt: ${{ secrets.SOPS_KEYS_TXT }}
