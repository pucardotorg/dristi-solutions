name: Dristi Monolith Pipeline

run-name: >
  ${{
    github.event_name == 'workflow_dispatch' &&
      format(
        'Manual deploy dristi-monolith → {0}',
        github.event.inputs.deployment_env
      )
    || github.event_name == 'push' &&
      format(
        'Push dristi-monolith: {0}',
        github.event.head_commit.message
      )
  }}

on:
  # ─── Automatic: any push to tracked branches that touches dristi-monolith ───
  push:
    branches:
      - main
      - develop
      - release/*
    paths:
      - 'dristi-monolith/**'

  # ─── Manual trigger ─────────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      deployment_env:
        required: true
        description: "Deployment environment"
        type: choice
        default: dev
        options:
          - dev


jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1 – Resolve branch & target environment
  # ═══════════════════════════════════════════════════════════════════════════
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      repo_branch:    ${{ steps.set_branch.outputs.BRANCH }}
      deployment_env: ${{ steps.set_env.outputs.deployment_env }}

    steps:
      - name: Resolve branch
        id: set_branch
        run: |
          BRANCH=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BRANCH="${{ github.ref_name }}"
          else
            # workflow_dispatch – use the branch that triggered the run
            BRANCH="${{ github.ref_name }}"
          fi
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "Resolved branch: $BRANCH"

      - name: Resolve deployment environment
        id: set_env
        run: |
          EVENT="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}"
          ENV_VALUE=""

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            ENV_VALUE="${{ inputs.deployment_env }}"
          elif [[ "$EVENT" == "push" ]]; then
            case "$REF_NAME" in
              main)        ENV_VALUE="dev" ;;
              develop)     ENV_VALUE="dev" ;;
              release/*)   ENV_VALUE="dev" ;;
              *)           ENV_VALUE="dev" ;;
            esac
          fi

          echo "Deployment environment: $ENV_VALUE"
          echo "deployment_env=$ENV_VALUE" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2 – Sonar analysis → Docker build & push → Deploy
  # ═══════════════════════════════════════════════════════════════════════════
  build-deploy:
    name: dristi-monolith - CI/CD
    runs-on: ubuntu-latest
    needs: setup
    environment:
      name: ${{ needs.setup.outputs.deployment_env }}

    steps:
      - name: Print run info
        run: |
          echo "Service     : dristi-monolith"
          echo "Branch      : ${{ needs.setup.outputs.repo_branch }}"
          echo "Environment : ${{ needs.setup.outputs.deployment_env }}"

      # ── Sonar Analysis ────────────────────────────────────────────────────
      # The composite action reads build/config.json to set language/version
      # env-vars, then runs: mvn -B -f <service_source_path>/pom.xml package sonar:sonar
      # For the monolith, service_source_path = "dristi-monolith" (set in
      # build/config.json), so Maven runs the full multi-module reactor.
      - name: Sonar Analysis
        uses: pucardotorg/dristi-backend-pbhrch/.github/actions/sonar-analysis@main
        with:
          service_name:  dristi-monolith
          sonar_token:   ${{ secrets.SONAR_TOKEN_BEEHYV }}
          branch:        ${{ needs.setup.outputs.repo_branch }}
          repo:          "pucardotorg/dristi-backend-pbhrch"
          ghub_token:    ${{ secrets.GHUB_TOKEN }}

      # ── Docker Build & Push ───────────────────────────────────────────────
      # The composite action reads build/config.json for dockerfile_path and
      # service_source_path, then calls:
      #   docker build --build-arg WORK_DIR=<service_source_path> \
      #     -f <dockerfile_path> .
      #
      # dristi-monolith/Dockerfile does NOT use WORK_DIR (paths are explicit),
      # so the extra build-arg is harmless. The build context is always the
      # repository root, which is what the Dockerfile requires.
      #
      # The esign keys are loaded via classpath: inside domain-integration, so
      # they must land in domain-integration/src/main/resources/ before the
      # Maven build that is embedded in the Docker image build.
      - name: Docker Build
        id: docker_build
        uses: pucardotorg/dristi-backend-pbhrch/.github/actions/docker-build@monolith-dockerfile
        with:
          service_name:           dristi-monolith
          docker_password:        ${{ secrets.ACR_PASSWORD }}
          branch:                 ${{ needs.setup.outputs.repo_branch }}
          esign_private_key:      ${{ secrets.ESIGN_PRIVATE_KEY }}
          esign_public_key:       ${{ secrets.ESIGN_PUBLIC_KEY }}
          esign_private_key_path: "dristi-monolith/domain-integration/src/main/resources/privateKey.pem"
          esign_public_key_path:  "dristi-monolith/domain-integration/src/main/resources/publicKey.cer"
          db_dockerfile_path:     "dristi-monolith/db/Dockerfile"

      # ── Deployment Summary ────────────────────────────────────────────────
      - name: Deployment Summary
        run: |
          echo "Image: docker.io/venkatramireddyb/dristi-monolith:${{ steps.docker_build.outputs.image_tag }}"
          echo "Deploying to: ${{ needs.setup.outputs.deployment_env }}"

      # ── Deploy to Kubernetes ──────────────────────────────────────────────
      - name: Deploy to Kubernetes
        uses: pucardotorg/pucar-DevOps/.github/actions/deploy-service@Solutions-Pipeline
        with:
          environment:   ${{ needs.setup.outputs.deployment_env }}
          service_group: ${{ env.service_group }}
          service_name:  dristi-monolith
          image_tag:     ${{ steps.docker_build.outputs.image_tag }}
          kubeconfig:    ${{ secrets.KUBECONFIG }}
          env_file:      ${{ vars.HELMFILE_ENV }}
          checkout_ref:  ${{ vars.DEVOPS_BRANCH }}
          sops_keys_txt: ${{ secrets.SOPS_KEYS_TXT }}
